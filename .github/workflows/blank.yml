name: Katalon Studio Execution Example

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

permissions:
  contents: write
  packages: write
  actions: read

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Katalon Studio Project
        uses: katalon-studio/katalon-studio-github-action@v3
        with:
          version: '11.0.0' 
          projectPath: '${{ github.workspace }}'
          args: '-noSplash -browserType="Chrome" -retry=0 -statusDelay=15 -testSuitePath="Test Suites/TS_Login" --projectID=355318'
        env:
          KATALON_API_KEY: ${{ secrets.KATALON_TOKEN }}
