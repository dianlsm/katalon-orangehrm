name: Katalon Studio Execution Example

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Supaya bisa klik "Run workflow" manual di GitHub

jobs:
  katalon-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }} 

      - name: Run Katalon Studio Project
        uses: katalon-studio/katalon-studio-github-action@v2
        with:
 
          version: 'latest' 
          projectPath: '${{ github.workspace }}'
          args: '-noSplash -browserType="Chrome" -retry=0 -statusDelay=15 -testSuitePath="Test Suites/TS_Login"'
        env:
          KATALON_API_KEY: ${{ secrets.GH_TOKEN }}
